<!-- PASSWORD GATE OVERLAY — Paste this into the <body> of each password-protected case study page, BEFORE the <main> -->

<div id="password-gate" class="password-gate" role="dialog" aria-labelledby="gate-title" aria-modal="true">
  <div class="password-gate-content">
    <h2 id="gate-title" class="password-gate-title">Michelle DaSilva</h2>
    <p class="password-gate-subtitle" id="gate-case-study">Case Study Title</p>
    
    <form class="password-gate-form" id="password-form" onsubmit="handlePasswordSubmit(event)">
      <div class="password-gate-field">
        <label for="password-input" class="password-gate-label">Enter Password</label>
        <input 
          type="password" 
          id="password-input" 
          class="password-gate-input" 
          placeholder="•••••••••" 
          autocomplete="current-password"
          aria-required="true"
          required
        />
        <span id="password-error" class="password-gate-error" role="alert"></span>
      </div>
      <button type="submit" class="password-gate-btn">Unlock</button>
    </form>

    <p class="password-gate-note">
      This work is password protected.<br>
      Password shared upon request.
    </p>
  </div>
</div>

<style>
  /* Password Gate Styles */
  .password-gate {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 10, 0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 1;
    transition: opacity 300ms ease;
  }

  .password-gate.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .password-gate-content {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 48px 32px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }

  .password-gate-title {
    font-family: var(--font-headline);
    font-size: 1.75rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .password-gate-subtitle {
    font-size: 0.95rem;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  .password-gate-form {
    margin-bottom: 24px;
  }

  .password-gate-field {
    margin-bottom: 16px;
    text-align: left;
  }

  .password-gate-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  .password-gate-input {
    width: 100%;
    padding: 12px 16px;
    font-size: 1rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  .password-gate-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,149,159,0.1);
  }

  .password-gate-input.error {
    border-color: var(--error);
    animation: shake 300ms ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .password-gate-error {
    display: block;
    font-size: 0.8rem;
    color: var(--error);
    margin-top: 6px;
  }

  .password-gate-btn {
    width: 100%;
    padding: 12px 24px;
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background-color var(--transition), transform var(--transition);
    min-height: 44px;
  }

  .password-gate-btn:hover {
    background-color: var(--accent-hover);
    transform: translateY(-2px);
  }

  .password-gate-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .password-gate-note {
    font-size: 0.8rem;
    color: var(--text-muted);
    line-height: 1.6;
  }

  @media (max-width: 640px) {
    .password-gate-content {
      padding: 40px 24px;
    }

    .password-gate-title {
      font-size: 1.5rem;
    }
  }
</style>

<script>
  // Password Gate Logic
  function initPasswordGate(caseStudyTitle) {
    const gateEl = document.getElementById('password-gate');
    const formEl = document.getElementById('password-form');
    const inputEl = document.getElementById('password-input');
    const errorEl = document.getElementById('password-error');
    const subtitleEl = document.getElementById('gate-case-study');
    const contentEl = document.querySelector('main');

    if (!gateEl || !contentEl) return;

    // Set case study title
    if (subtitleEl && caseStudyTitle) {
      subtitleEl.textContent = caseStudyTitle;
    }

    // Check if already authenticated this session
    if (sessionStorage.getItem('portfolio-authenticated') === 'true') {
      gateEl.classList.add('hidden');
      return;
    }

    // Prevent main content from being accessible before authentication
    contentEl.setAttribute('aria-hidden', 'true');
    contentEl.tabIndex = -1;

    // Focus on password input
    inputEl.focus();

    // Handle form submission
    formEl.addEventListener('submit', handlePasswordSubmit);
  }

  function handlePasswordSubmit(event) {
    event.preventDefault();

    const inputEl = document.getElementById('password-input');
    const errorEl = document.getElementById('password-error');
    const gateEl = document.getElementById('password-gate');
    const contentEl = document.querySelector('main');

    const enteredPassword = inputEl.value.trim();

    // Check password against imported constant
    if (enteredPassword === PORTFOLIO_PASSWORD) {
      // Correct password
      errorEl.textContent = '';
      inputEl.classList.remove('error');

      // Set session storage and hide gate
      sessionStorage.setItem('portfolio-authenticated', 'true');
      
      gateEl.classList.add('hidden');
      
      // Restore content accessibility
      if (contentEl) {
        contentEl.removeAttribute('aria-hidden');
        contentEl.tabIndex = 0;
        contentEl.focus();
      }
    } else {
      // Incorrect password
      errorEl.textContent = 'Incorrect password. Try again.';
      inputEl.classList.add('error');
      inputEl.value = '';
      inputEl.focus();
    }
  }

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', () => {
    initPasswordGate('Case Study Title'); // Replace 'Case Study Title' with actual title
  });
</script>
